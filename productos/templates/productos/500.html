{% extends "productos/base.html" %}
{% load static %}

{% block title %}Error del servidor{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-80">
    <div class="col-md-6 text-center">
        <span style="font-size: 6rem;">⚠️</span>
        <h1 class="display-1 fw-bold text-danger">500</h1>
        <h3 class="text-muted mb-4">Error interno del servidor</h3>
        <p class="text-muted mb-4">Ha ocurrido un error inesperado. Por favor intenta de nuevo más tarde.</p>
        <a href="{% url 'productos:list' %}" class="btn btn-warning fw-bold px-4">Volver al inicio</a>
    </div>
</div>
{% endblock %}
