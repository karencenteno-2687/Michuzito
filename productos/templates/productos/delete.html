{% extends "productos/base.html" %}
{% load static %}

{% block title %}Eliminar Producto{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card bg-dark border-danger">
            <div class="card-body text-center p-5">
                <span style="font-size: 4rem;">⚠️</span>
                <h3 class="fw-bold mt-3 text-danger">¿Eliminar Producto?</h3>
                <p class="text-muted mb-1">Estás a punto de eliminar:</p>
                <h5 class="fw-bold text-warning">{{ object.nombre }}</h5>
                <p class="text-muted small">Esta acción es reversible (eliminación lógica).</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2 mt-4">
                        <button type="submit" class="btn btn-danger fw-bold px-4">
                            Sí, Eliminar
                        </button>
                        <a href="{% url 'productos:list' %}" class="btn btn-outline-secondary px-4">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
