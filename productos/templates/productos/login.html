{% extends "productos/base.html" %}
{% load static %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-80">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5 text-center">
                <div class="mb-4">
                    <span style="font-size: 4rem;">🍢</span>
                    <h2 class="fw-bold text-warning mt-2">Mi Chuzito</h2>
                    <p class="text-muted">Gestiona tus productos</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3 text-start">
                        <label class="form-label">Usuario</label>
                        <input type="text" name="username" class="form-control form-control-lg" required autofocus>
                    </div>
                    <div class="mb-4 text-start">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control form-control-lg" required>
                    </div>
                    {% if form.errors %}
                    <div class="alert alert-danger py-2">
                        Usuario o contraseña incorrectos.
                    </div>
                    {% endif %}
                    <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold">
                        Ingresar
                    </button>
                </form>
                <p class="mt-3 mb-0 text-muted">
                    ¿No tienes cuenta?
                    <a href="{% url 'productos:signup' %}" class="text-warning text-decoration-none">Regístrate</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
